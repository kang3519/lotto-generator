<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>⚽ 2026 월드컵 AI 예측 & 내기</title>
  <style>
    :root{--red:#e74c3c;--orange:#f39c12;--green:#27ae60;--blue:#2980b9;--primary:#3498db}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,Helvetica,sans-serif;background:#f0f4f8;min-height:100vh}
    nav{background:#1a3a5c;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20;box-shadow:0 2px 8px rgba(0,0,0,.2)}

    .container{max-width:800px;margin:0 auto;padding:20px 14px;display:flex;flex-direction:column;gap:16px}

    .btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 16px;background:var(--primary);color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:.88rem;font-weight:600;transition:filter .15s}

    .round-hdr{background:linear-gradient(90deg,#1a3a5c,#2980b9);color:#fff;border-radius:7px;padding:7px 12px;font-weight:700;font-size:.8rem;margin:14px 0 6px;letter-spacing:.4px}
    .match-card{border:1px solid #e4eaf2;border-radius:10px;margin:6px 0;overflow:hidden}

    .ph{background:#3498db;color:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;white-space:nowrap;transition:width .4s;min-width:0}
    .pd{background:#95a5a6;color:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;white-space:nowrap;transition:width .4s;min-width:0}
    .pa{background:#e74c3c;color:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;white-space:nowrap;transition:width .4s;min-width:0}

    /* Expand / betting panel */
    .bet-panel{border-top:2px solid #eef2f7;background:#f8faff;padding:14px}
    .ai-hint{font-size:.8rem;color:#666;margin-bottom:12px;background:#fff;border:1px solid #e4eaf2;border-radius:7px;padding:8px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .ai-hint strong{color:#8e54e9}
    .bet-table{width:100%;border-collapse:collapse;margin-bottom:10px}
    .bet-table th{font-size:.75rem;color:#888;font-weight:600;padding:4px 6px;border-bottom:2px solid #eef2f7;text-align:left}
    .bet-table th.c{text-align:center}
    .bet-table td{padding:7px 6px;border-bottom:1px solid #f0f4f8;vertical-align:middle}
    .bet-table tr:last-child td{border-bottom:none}
    .p-name{font-weight:700;font-size:.85rem}
    .score-cell{display:flex;align-items:center;gap:6px;justify-content:center}
    .s-inp{width:42px;height:34px;text-align:center;font-size:1rem;font-weight:700;border:2px solid #ddd;border-radius:6px;padding:2px;-moz-appearance:textfield}
    .s-inp::-webkit-inner-spin-button,.s-inp::-webkit-outer-spin-button{-webkit-appearance:none}
    .s-inp:focus{border-color:var(--primary);outline:none}
    .s-inp:disabled{background:#f0f4f8;color:#aaa;border-color:#e0e0e0}
    .colon{font-size:1.1rem;font-weight:700;color:#aaa}
    .result-cell{text-align:center;font-size:.82rem;font-weight:700;white-space:nowrap}
    .badge-exact{color:#fff;background:var(--green);border-radius:5px;padding:2px 8px}
    .badge-close{color:#fff;background:var(--orange);border-radius:5px;padding:2px 8px}
    .badge-lose{color:#fff;background:var(--red);border-radius:5px;padding:2px 8px}
    .badge-none{color:#aaa;font-size:.78rem}
    .pot-row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:6px}
    .pot-info{font-size:.78rem;color:#888}
    .pot-info strong{color:#333}

    /* Participants */
    .p-row{display:flex;align-items:center;gap:10px;padding:9px 2px;border-bottom:1px solid #f0f0f0}
    .p-row:last-child{border-bottom:none}

    /* Settlement */
    .lb-row{display:flex;align-items:center;gap:12px;padding:10px 4px;border-bottom:1px solid #f5f5f5}
    .lb-row:last-child{border-bottom:none}
    .rnum{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;color:#fff;flex-shrink:0;background:#bbb}
    .rnum.g{background:var(--orange)}.rnum.s{background:#95a5a6}.rnum.b{background:#cd7f32}
    .txn{display:flex;align-items:center;gap:8px;padding:9px 6px;border-bottom:1px solid #f0f4f8;font-size:.9rem}
    .txn:last-child{border-bottom:none}
    .txn-arrow{color:var(--red);font-weight:800}
    .txn-amt{margin-left:auto;font-weight:700;color:var(--green)}

    @media(max-width:500px){.team{font-size:.78rem}.mid{min-width:90px}.s-inp{width:36px;height:30px}}
  </style>
</head>
<body>

<nav>
  <a href="index.html">🎱 로또</a>
  <h1>⚽ 2026 FIFA 월드컵 AI 예측 &amp; 내기</h1>
</nav>

<div class="container">

  <!-- ① 참가자 먼저 -->
  <div class="card">
    <div class="card-title">👥 내기 참가자 등록</div>
    <p style="font-size:.8rem;color:#888;margin-bottom:12px">경기당 내기 금액을 설정하세요. 각자 스코어를 예측하고 가장 정확한 사람이 판돈 전체를 가져갑니다.</p>
    <div style="display:grid;grid-template-columns:1fr 150px auto;gap:8px;align-items:end;margin-bottom:12px">
      <div>
        <label style="font-size:.75rem;color:#888;display:block;margin-bottom:3px">이름</label>
        <input type="text" id="p-name" placeholder="홍길동" style="width:100%" />
      </div>
      <div>
        <label style="font-size:.75rem;color:#888;display:block;margin-bottom:3px">경기당 내기 금액 (원)</label>
        <input type="number" id="p-bet" placeholder="10000" min="0" step="1000" style="width:100%" />
      </div>
      <button class="btn" onclick="addParticipant()" style="height:38px;margin:0">추가</button>
    </div>
    <div id="participants-list">
      <p style="text-align:center;color:#ccc;font-size:.85rem;padding:10px">아직 참가자가 없습니다</p>
    </div>
  </div>

  <!-- ② 경기 & AI + 내기 스코어 입력 -->
  <div class="card">
    <div class="card-title">⚽ 경기 스코어 내기</div>
    <p style="font-size:.8rem;color:#888;margin-bottom:12px">경기를 클릭해서 각자 예측 스코어를 입력하세요 · AI 예측이 참고용으로 표시됩니다</p>
    <div id="matches-list">
      <div style="text-align:center;padding:40px;color:#bbb">⏳ 경기 데이터 로딩 중...</div>
    </div>
  </div>

  <!-- ③ 종합 정산 -->
  <div class="card">
    <div class="card-title">🏆 종합 순위 &amp; 정산</div>
    <p style="font-size:.8rem;color:#888;margin-bottom:12px">
      🎯 정확한 스코어 → 판돈 전액 수령 &nbsp;|&nbsp; 아무도 정확히 못 맞추면 → 가장 근접한 사람이 수령
    </p>
    <div id="settlement">
      <p style="text-align:center;color:#ccc;font-size:.85rem;padding:12px">스코어를 입력하고 저장하면 자동 계산됩니다</p>
    </div>
  </div>

</div>

<script>
/* ===== STATE ===== */
const PARTS_KEY = 'wc2026_participants';
const PICKS_KEY = 'wc2026_score_picks'; // score-based picks (different key from old version)

let wMatches     = [];
let participants = JSON.parse(localStorage.getItem(PARTS_KEY) || '[]');
let picks        = JSON.parse(localStorage.getItem(PICKS_KEY) || '{}');
const aiCache    = {};

/* ===== FLAGS ===== */
const F = {
  'Brazil':'🇧🇷','France':'🇫🇷','Argentina':'🇦🇷','Spain':'🇪🇸','England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿',
  'Germany':'🇩🇪','Portugal':'🇵🇹','Netherlands':'🇳🇱','Belgium':'🇧🇪','Italy':'🇮🇹',
  'Croatia':'🇭🇷','Uruguay':'🇺🇾','Mexico':'🇲🇽','United States':'🇺🇸','Canada':'🇨🇦',
  'Japan':'🇯🇵','South Korea':'🇰🇷','Australia':'🇦🇺','Morocco':'🇲🇦','Senegal':'🇸🇳',
  'Ghana':'🇬🇭','Cameroon':'🇨🇲','Nigeria':'🇳🇬','Saudi Arabia':'🇸🇦','Iran':'🇮🇷',
  'Poland':'🇵🇱','Switzerland':'🇨🇭','Denmark':'🇩🇰','Serbia':'🇷🇸','Ecuador':'🇪🇨',
  'Colombia':'🇨🇴','Chile':'🇨🇱','Peru':'🇵🇪','Tunisia':'🇹🇳','Algeria':'🇩🇿',
  'Qatar':'🇶🇦','Costa Rica':'🇨🇷','Panama':'🇵🇦','Jamaica':'🇯🇲','Indonesia':'🇮🇩',
  'Venezuela':'🇻🇪','Bolivia':'🇧🇴','New Zealand':'🇳🇿','Kenya':'🇰🇪',
};
const flag = n => F[n] || '🏳️';

/* ===== POISSON AI ===== */
function poisson(k, λ) {
  let r = Math.exp(-λ);
  for (let i = 1; i <= k; i++) r *= λ / i;
  return r;
}

async function fetchStrength(teamName) {
  const s = await fetch(`https://www.thesportsdb.com/api/v1/json/3/searchteams.php?t=${encodeURIComponent(teamName)}`)
    .then(r => r.json()).catch(() => null);
  const team = s?.teams?.[0];
  if (!team) return { atk: 1, def: 1 };
  const e = await fetch(`https://www.thesportsdb.com/api/v1/json/3/eventslast.php?id=${team.idTeam}`)
    .then(r => r.json()).catch(() => null);
  const events = (e?.results || []).slice(0, 8);
  if (!events.length) return { atk: 1, def: 1 };
  let scored = 0, conceded = 0;
  events.forEach(ev => {
    const home = ev.strHomeTeam === teamName || ev.strHomeTeam.startsWith(teamName.split(' ')[0]);
    scored   += home ? +ev.intHomeScore : +ev.intAwayScore;
    conceded += home ? +ev.intAwayScore : +ev.intHomeScore;
  });
  const avg = 1.35;
  return {
    atk: Math.max(0.3, (scored   / events.length) / avg),
    def: Math.min(3.0, avg / Math.max(0.3, conceded / events.length))
  };
}

async function aiPredict(matchId, home, away) {
  if (aiCache[matchId]) return aiCache[matchId];
  const [hs, as_] = await Promise.all([fetchStrength(home), fetchStrength(away)]);
  const hExp = hs.atk * as_.def * 1.35 * 1.1;
  const aExp = as_.atk * hs.def * 1.35;
  const probs = [];
  let hw = 0, dw = 0, aw = 0;
  for (let h = 0; h <= 6; h++)
    for (let a = 0; a <= 6; a++) {
      const p = poisson(h, hExp) * poisson(a, aExp);
      probs.push({ h, a, p });
      if (h > a) hw += p; else if (h === a) dw += p; else aw += p;
    }
  probs.sort((a, b) => b.p - a.p);
  const t = hw + dw + aw;
  const result = {
    best: probs[0], top3: probs.slice(0, 3),
    hw: Math.round(hw/t*100), dw: Math.round(dw/t*100), aw: Math.round(aw/t*100)
  };
  aiCache[matchId] = result;
  return result;
}

/* ===== LOAD MATCHES ===== */
async function loadMatches() {
  const container = document.getElementById('matches-list');
  try {
    let events = null;
    const res = await fetch('https://www.thesportsdb.com/api/v1/json/3/eventsseason.php?id=4480&s=2026')
      .then(r => r.json()).catch(() => null);
    events = res?.events;
    if (!events?.length) {
      const [past, next] = await Promise.all([
        fetch('https://www.thesportsdb.com/api/v1/json/3/eventspastleague.php?id=4480').then(r=>r.json()).catch(()=>null),
        fetch('https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=4480').then(r=>r.json()).catch(()=>null),
      ]);
      events = [...(past?.events||[]), ...(next?.events||[])];
    }
    wMatches = (events||[]).sort((a,b) =>
      new Date(a.dateEvent+'T'+(a.strTime||'00:00')) - new Date(b.dateEvent+'T'+(b.strTime||'00:00'))
    );
    if (!wMatches.length) {
      container.innerHTML = `<div style="text-align:center;padding:40px;color:#aaa">
        <div style="font-size:2.5em">⚽</div>
        <div style="font-weight:700;margin-top:8px">2026 월드컵 데이터 없음</div>
        <div style="font-size:.8em;color:#bbb;margin-top:4px">TheSportsDB에 데이터가 아직 없을 수 있습니다</div>
      </div>`;
      return;
    }
    renderMatchList(container);
    startAIProgress();
    updateSettlement();
  } catch(e) {
    container.innerHTML = `<div style="text-align:center;color:var(--red);padding:24px">오류: ${e.message}</div>`;
  }
}

/* ===== MATCH LIST ===== */
function actualResult(m) {
  if (m.intHomeScore == null || m.intHomeScore === '') return null;
  return { h: +m.intHomeScore, a: +m.intAwayScore };
}

function matchWinners(m) {
  const actual = actualResult(m);
  if (!actual) return { winners: [], type: null };
  const entered = participants.filter(p => picks[p.id]?.[m.idEvent]?.h !== undefined);
  if (!entered.length) return { winners: [], type: null };

  // Check exact
  const exact = entered.filter(p =>
    picks[p.id][m.idEvent].h === actual.h && picks[p.id][m.idEvent].a === actual.a
  );
  if (exact.length) return { winners: exact, type: 'exact' };

  // Closest
  const withDist = entered.map(p => ({
    p,
    d: Math.abs(picks[p.id][m.idEvent].h - actual.h) + Math.abs(picks[p.id][m.idEvent].a - actual.a)
  }));
  const minD = Math.min(...withDist.map(x => x.d));
  return { winners: withDist.filter(x => x.d === minD).map(x => x.p), type: 'closest', dist: minD };
}

function renderMatchList(container) {
  const rounds = {};
  wMatches.forEach(m => {
    const r = m.strRound || `라운드 ${m.intRound||'?'}`;
    (rounds[r] = rounds[r]||[]).push(m);
  });
  let html = '';
  for (const [round, ms] of Object.entries(rounds)) {
    html += `<div class="round-hdr">📅 ${round}</div>`;
    for (const m of ms) {
      const done = actualResult(m);
      const date = m.dateEvent
        ? new Date(m.dateEvent+'T12:00:00').toLocaleDateString('ko-KR',{month:'numeric',day:'numeric',weekday:'short'})
        : '';
      html += `<div class="match-card">
        <div class="match-hdr" onclick="toggleExpand('${m.idEvent}')">
          <div class="match-row">
            <span class="team r">${flag(m.strHomeTeam)} ${m.strHomeTeam}</span>
            <div class="mid">
              <div id="ai-${m.idEvent}"><span style="color:#ccc;font-size:.75rem">AI 분석 중...</span></div>
              ${done
                ? `<div class="actual-score">${done.h} : ${done.a}</div>`
                : `<div class="match-date">${date}</div>`}
            </div>
            <span class="team">${flag(m.strAwayTeam)} ${m.strAwayTeam}</span>
          </div>
          <div class="prob-bar" id="prob-${m.idEvent}">
            <div class="ph" style="width:40%">홈</div>
            <div class="pd" style="width:20%">무</div>
            <div class="pa" style="width:40%">원정</div>
          </div>
        </div>
        <div class="bet-panel" id="expand-${m.idEvent}" style="display:none">
          ${betPanelHTML(m)}
        </div>
      </div>`;
    }
  }
  container.innerHTML = html;
}

function toggleExpand(matchId) {
  const el = document.getElementById('expand-'+matchId);
  if (!el) return;
  const opening = el.style.display === 'none';
  el.style.display = opening ? '' : 'none';
  // Re-render on open to reflect latest picks/participants
  if (opening) {
    const m = wMatches.find(m => m.idEvent === matchId);
    if (m) el.innerHTML = betPanelHTML(m);
  }
}

/* ===== BET PANEL HTML ===== */
function betPanelHTML(m) {
  const done   = !!actualResult(m);
  const actual = actualResult(m);
  const ai     = aiCache[m.idEvent];
  const { winners, type } = matchWinners(m);
  const winnerIds = winners.map(p => p.id);
  const entered = participants.filter(p => picks[p.id]?.[m.idEvent]?.h !== undefined);
  const pot = entered.reduce((s,p) => s + p.bet, 0);
  const potAll = participants.reduce((s,p) => s + p.bet, 0);

  let html = '';

  // AI hint
  if (ai) {
    const top3 = ai.top3.map(s=>`${s.h}:${s.a}`).join(' / ');
    html += `<div class="ai-hint">
      🤖 AI 예측: <strong>${ai.best.h}:${ai.best.a}</strong> &nbsp;
      <span style="color:#aaa">|</span>&nbsp;
      홈 승 <strong style="color:#3498db">${ai.hw}%</strong> &nbsp;
      무 <strong style="color:#95a5a6">${ai.dw}%</strong> &nbsp;
      원정 승 <strong style="color:#e74c3c">${ai.aw}%</strong> &nbsp;
      <span style="font-size:.72rem;color:#bbb">(상위 3: ${top3})</span>
    </div>`;
  } else {
    html += `<div class="ai-hint" style="color:#ccc">🤖 AI 분석 중...</div>`;
  }

  if (!participants.length) {
    return html + '<p style="text-align:center;color:#bbb;padding:10px;font-size:.82rem">위에서 참가자를 먼저 추가하세요</p>';
  }

  // Table header
  html += `<table class="bet-table">
    <thead>
      <tr>
        <th>참가자</th>
        <th class="c">예측 스코어<br><span style="font-weight:400;font-size:.7rem">(홈 : 원정)</span></th>
        <th class="c">결과</th>
      </tr>
    </thead>
    <tbody>`;

  participants.forEach(p => {
    const pick = picks[p.id]?.[m.idEvent];
    const hVal = pick?.h !== undefined ? pick.h : '';
    const aVal = pick?.a !== undefined ? pick.a : '';
    const isWinner = winnerIds.includes(p.id);
    const isExact  = actual && pick && pick.h === actual.h && pick.a === actual.a;

    // Result badge
    let badge = `<span class="badge-none">미입력</span>`;
    if (actual && pick !== undefined) {
      if (isWinner) {
        const share = pot / winners.length;
        const net   = share - p.bet;
        const label = isExact ? '🎯 정확!' : `📍 최근접`;
        const color = isExact ? 'badge-exact' : 'badge-close';
        badge = `<span class="${color}">${label}<br>+${Math.round(net).toLocaleString()}원</span>`;
      } else if (pick) {
        badge = `<span class="badge-lose">❌<br>-${p.bet.toLocaleString()}원</span>`;
      } else {
        badge = `<span class="badge-none">미입력</span>`;
      }
    }

    html += `<tr>
      <td class="p-name">👤 ${p.name}<br><span style="font-size:.72rem;color:#aaa;font-weight:400">${p.bet.toLocaleString()}원</span></td>
      <td>
        <div class="score-cell">
          <input class="s-inp" type="number" min="0" max="20"
            value="${hVal}" placeholder="0"
            data-pid="${p.id}" data-mid="${m.idEvent}" data-side="h"
            ${done ? 'disabled' : ''} />
          <span class="colon">:</span>
          <input class="s-inp" type="number" min="0" max="20"
            value="${aVal}" placeholder="0"
            data-pid="${p.id}" data-mid="${m.idEvent}" data-side="a"
            ${done ? 'disabled' : ''} />
        </div>
      </td>
      <td class="result-cell">${badge}</td>
    </tr>`;
  });

  html += `</tbody></table>`;

  // Pot info + save button
  if (!done) {
    html += `<div class="pot-row">
      <span class="pot-info">
        총 판돈: <strong>${potAll.toLocaleString()}원</strong>
        (${participants.map(p=>`${p.name} ${p.bet.toLocaleString()}원`).join(' + ')})
      </span>
      <button class="btn sm green" onclick="saveMatchPicks('${m.idEvent}')">💾 저장</button>
    </div>`;
  } else if (winners.length) {
    const typeLabel = type === 'exact' ? '정확한 스코어 적중' : `최근접 예측 (오차 ${matchWinners(m).dist}골)`;
    html += `<div style="margin-top:8px;padding:8px 10px;background:#f0fff4;border-radius:7px;font-size:.82rem;color:#1e8449">
      🏆 <strong>${winners.map(p=>p.name).join(', ')}</strong> 승리 — ${typeLabel} — 각 ${Math.round(pot/winners.length).toLocaleString()}원 수령
    </div>`;
  }

  return html;
}

/* ===== SAVE PICKS ===== */
function saveMatchPicks(matchId) {
  let saved = false;
  document.querySelectorAll(`.s-inp[data-mid="${matchId}"]`).forEach(inp => {
    const pid = inp.dataset.pid, side = inp.dataset.side;
    const val = inp.value.trim();
    if (val === '') return;
    if (!picks[pid]) picks[pid] = {};
    if (!picks[pid][matchId]) picks[pid][matchId] = {};
    picks[pid][matchId][side] = +val;
    saved = true;
  });
  if (!saved) { alert('스코어를 입력해주세요'); return; }
  // Only keep complete picks (both h and a filled)
  participants.forEach(p => {
    const pk = picks[p.id]?.[matchId];
    if (pk && (pk.h === undefined || pk.a === undefined)) delete picks[p.id][matchId];
  });
  localStorage.setItem(PICKS_KEY, JSON.stringify(picks));
  // Re-render this match's panel
  const m = wMatches.find(m => m.idEvent === matchId);
  const el = document.getElementById('expand-'+matchId);
  if (m && el) el.innerHTML = betPanelHTML(m);
  updateSettlement();
  // Quick visual feedback
  const btn = document.querySelector(`button[onclick="saveMatchPicks('${matchId}')"]`);
  if (btn) { const orig = btn.textContent; btn.textContent = '✅ 저장됨'; setTimeout(() => btn.textContent = orig, 1200); }
}

/* ===== PARTICIPANTS ===== */
function addParticipant() {
  const name = document.getElementById('p-name').value.trim();
  const bet  = +document.getElementById('p-bet').value;
  if (!name)    { alert('이름을 입력하세요'); return; }
  if (bet <= 0) { alert('내기 금액을 입력하세요'); return; }
  if (participants.some(p => p.name === name)) { alert('이미 있는 이름입니다'); return; }
  participants.push({ id: Date.now().toString(36), name, bet });
  localStorage.setItem(PARTS_KEY, JSON.stringify(participants));
  document.getElementById('p-name').value = '';
  renderParticipants();
  updateSettlement();
}

function removeParticipant(id) {
  if (!confirm('삭제할까요?')) return;
  participants = participants.filter(p => p.id !== id);
  localStorage.setItem(PARTS_KEY, JSON.stringify(participants));
  renderParticipants();
  updateSettlement();
}

function renderParticipants() {
  const el = document.getElementById('participants-list');
  if (!participants.length) {
    el.innerHTML = '<p style="text-align:center;color:#ccc;font-size:.85rem;padding:8px">아직 없습니다</p>';
    return;
  }
  el.innerHTML = participants.map(p => `
    <div class="p-row">
      <span style="flex:1;font-weight:700">👤 ${p.name}</span>
      <span style="color:#888;font-size:.82rem">💰 ${p.bet.toLocaleString()}원/경기</span>
      <button class="btn sm red" onclick="removeParticipant('${p.id}')" style="margin:0;margin-left:8px">삭제</button>
    </div>`).join('');
}

/* ===== SETTLEMENT ===== */
function updateSettlement() {
  const el = document.getElementById('settlement');
  if (!participants.length) {
    el.innerHTML = '<p style="text-align:center;color:#ccc;font-size:.85rem;padding:12px">참가자 추가 후 자동 계산됩니다</p>';
    return;
  }

  const balance = {}, wins = {}, matched = {};
  participants.forEach(p => { balance[p.id] = 0; wins[p.id] = 0; matched[p.id] = 0; });

  let completedCount = 0;
  wMatches.forEach(m => {
    const actual = actualResult(m);
    if (!actual) return;
    completedCount++;
    const entered = participants.filter(p => picks[p.id]?.[m.idEvent]?.h !== undefined);
    if (!entered.length) return;
    const { winners, type } = matchWinners(m);
    const pot = entered.reduce((s,p) => s + p.bet, 0);
    entered.forEach(p => {
      if (winners.find(w => w.id === p.id)) {
        const share = pot / winners.length;
        balance[p.id] += share - p.bet;
        wins[p.id]++;
        matched[p.id]++;
      } else {
        balance[p.id] -= p.bet;
        matched[p.id]++;
      }
    });
  });

  const ranked = participants.slice().sort((a,b) => balance[b.id] - balance[a.id] || wins[b.id] - wins[a.id]);
  const rc = i => ['g','s','b'][i] || '';
  const med = i => ['🥇','🥈','🥉'][i] || '';

  let html = ranked.map((p,i) => {
    const net = balance[p.id];
    const netStr = net > 0
      ? `<span style="color:var(--green);font-weight:800">+${Math.round(net).toLocaleString()}원</span>`
      : net < 0
      ? `<span style="color:var(--red);font-weight:800">${Math.round(net).toLocaleString()}원</span>`
      : `<span style="color:#aaa">±0원</span>`;
    const predCount = Object.keys(picks[p.id]||{}).filter(mid =>
      picks[p.id][mid]?.h !== undefined && picks[p.id][mid]?.a !== undefined
    ).length;
    return `<div class="lb-row">
      <div class="rnum ${rc(i)}">${i+1}</div>
      <div style="flex:1">
        <div style="font-weight:700">${p.name} ${med(i)}</div>
        <div style="font-size:.76rem;color:#aaa">${wins[p.id]}경기 승리 / ${predCount}경기 예측 입력</div>
      </div>
      <div>${netStr}</div>
    </div>`;
  }).join('');

  // Transaction settlement
  const pos = participants.filter(p => balance[p.id] >  0.5).map(p => ({name:p.name, amt:  balance[p.id]})).sort((a,b)=>b.amt-a.amt);
  const neg = participants.filter(p => balance[p.id] < -0.5).map(p => ({name:p.name, amt: -balance[p.id]})).sort((a,b)=>b.amt-a.amt);

  if (neg.length && completedCount > 0) {
    html += `<div style="border-top:2px solid #eef2f7;margin-top:12px;padding-top:12px">
      <div style="font-weight:700;color:#333;margin-bottom:8px">💸 정산 내역 (최소 거래)</div>`;
    const p2 = pos.map(x=>({...x})), n2 = neg.map(x=>({...x}));
    let i=0,j=0;
    while(i<n2.length && j<p2.length){
      const amt = Math.min(n2[i].amt, p2[j].amt);
      if(amt >= 1){
        html += `<div class="txn">
          <span style="font-weight:700">${n2[i].name}</span>
          <span class="txn-arrow">→</span>
          <span style="font-weight:700">${p2[j].name}</span>
          <span class="txn-amt">${Math.round(amt).toLocaleString()}원</span>
        </div>`;
      }
      n2[i].amt -= amt; p2[j].amt -= amt;
      if(n2[i].amt < 1) i++; if(p2[j].amt < 1) j++;
    }
    html += `</div>`;
  } else if (!completedCount) {
    html += `<p style="text-align:center;color:#bbb;font-size:.82rem;padding:10px;border-top:1px solid #f0f4f8;margin-top:10px">경기 결과가 나오면 자동으로 계산됩니다</p>`;
  }

  el.innerHTML = html;
}

/* ===== AI PROGRESS ===== */
async function startAIProgress() {
  for (const m of wMatches.slice(0, 32)) {
    try {
      const pred = await aiPredict(m.idEvent, m.strHomeTeam, m.strAwayTeam);
      const aiEl = document.getElementById('ai-'+m.idEvent);
      if (aiEl) aiEl.innerHTML = `<span class="ai-score">${pred.best.h}:${pred.best.a}</span>`;
      const probEl = document.getElementById('prob-'+m.idEvent);
      if (probEl) probEl.innerHTML = `
        <div class="ph" style="width:${pred.hw}%">홈 ${pred.hw}%</div>
        <div class="pd" style="width:${pred.dw}%">무 ${pred.dw}%</div>
        <div class="pa" style="width:${pred.aw}%">원정 ${pred.aw}%</div>`;
      // If this match's panel is open, refresh it too
      const panel = document.getElementById('expand-'+m.idEvent);
      if (panel && panel.style.display !== 'none') panel.innerHTML = betPanelHTML(m);
    } catch {}
    await new Promise(r => setTimeout(r, 120));
  }
}

/* ===== INIT ===== */
document.addEventListener('DOMContentLoaded', () => {
  renderParticipants();
  updateSettlement();
  loadMatches();
});
</script>

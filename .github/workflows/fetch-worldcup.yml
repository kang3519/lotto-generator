name: Fetch World Cup Data

on:
  schedule:
    - cron: '0 */6 * * *'   # 6시간마다 (06·12·18·00 UTC)
  workflow_dispatch:          # 수동 실행 허용

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch World Cup match results from TheSportsDB
        run: |
          mkdir -p data
          python3 - <<'EOF'
          import requests, json, time
          from datetime import datetime, timezone, date, timedelta

          API_BASE = 'https://www.thesportsdb.com/api/v1/json/3'
          HEADERS  = {'User-Agent': 'Mozilla/5.0'}

          def get(url):
              for attempt in range(3):
                  try:
                      r = requests.get(url, timeout=10, headers=HEADERS)
                      return r.json()
                  except Exception as e:
                      print(f'  retry {attempt+1}: {e}')
                      time.sleep(2 ** attempt)
              return {}

          # ── 1. WC2026 리그 ID 찾기 ──
          print('Searching for WC2026 league id...')
          league_id = None
          data = get(f'{API_BASE}/search_all_leagues.php?c=International&s=Soccer')
          for lg in (data.get('countrys') or []):
              name = (lg.get('strLeague') or '').lower()
              if '2026' in name and ('world' in name or 'fifa' in name):
                  league_id = lg.get('idLeague')
                  print(f'  Found: {lg["strLeague"]} → {league_id}')
                  break
          if not league_id:
              # 알려진 WC 리그 ID 후보 시도
              for lid in ['4479', '4429', '4480']:
                  d = get(f'{API_BASE}/lookupleague.php?id={lid}')
                  lg = (d.get('leagues') or [None])[0]
                  if lg and '2026' in (lg.get('strLeague') or ''):
                      league_id = lid
                      print(f'  Fallback found: {lg["strLeague"]} → {league_id}')
                      break
          if not league_id:
              print('  WARNING: League id not found, skipping day-fetch')

          events = {}  # idEvent → event dict

          # ── 2. 날짜별 조회 (June 11 ~ today+1) ──
          if league_id:
              start = date(2026, 6, 11)
              end   = date.today() + timedelta(days=1)
              d = start
              while d <= end:
                  ds = d.strftime('%Y-%m-%d')
                  res = get(f'{API_BASE}/eventsday.php?d={ds}&l={league_id}')
                  for ev in (res.get('events') or []):
                      eid = ev.get('idEvent')
                      if eid:
                          events[eid] = ev
                  print(f'  {ds}: {len(res.get("events") or [])} events')
                  d += timedelta(days=1)
                  time.sleep(2.1)

          # ── 3. 알려진 실제 이벤트 ID 개별 조회 ──
          KNOWN_IDS = [
              '2391728','2461103','2461109','2391747','2391766',
              '2461104','2391732','2391746','2391767',
              '2391730','2391731','2391749','2391748','2391764','2391765',
              '2391729','2391750','2461111','2391770','2461118',
              '2391733','2391734','2391752','2391751','2391768','2391769',
              '2391753',
              '2391736','2391737','2391754','2391755','2391773','2391774',
              '2391738','2391739','2391772',
              '2391742','2461107','2461113','2391760','2391775',
              '2391740','2391741','2391758','2391759','2391777','2391780',
              '2391745','2391743','2391761',
          ]
          print(f'Fetching {len(KNOWN_IDS)} known events...')
          for eid in KNOWN_IDS:
              if eid not in events:
                  res = get(f'{API_BASE}/lookupevent.php?id={eid}')
                  ev  = (res.get('events') or [None])[0]
                  if ev:
                      events[eid] = ev
                      print(f'  {eid}: {ev.get("strHomeTeam")} vs {ev.get("strAwayTeam")} → {ev.get("intHomeScore")}-{ev.get("intAwayScore")}')
                  time.sleep(2.1)

          out = {
              'updated': datetime.now(timezone.utc).isoformat(),
              'events': list(events.values()),
          }
          with open('data/worldcup.json', 'w', encoding='utf-8') as f:
              json.dump(out, f, ensure_ascii=False)
          print(f'Saved {len(events)} events')
          EOF

      - name: Commit and push
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/worldcup.json
          git diff --staged --quiet || git commit -m "Auto-update worldcup data $(date +%Y-%m-%d\ %H:%M)"
          git push
